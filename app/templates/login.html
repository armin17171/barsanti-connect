{% extends "base.html" %}
{% block title %}Accedi · Barsanti Connect{% endblock %}

{% block content %}
<div class="auth-card card">
  <img src="/static/img/logo.png" alt="BC" class="auth-logo">
  <h1>Accedi</h1>
  {% if error %}<div class="alert err">{{ error }}</div>{% endif %}
  <form method="post" action="/login" class="form">
    <label class="field-label">Username</label>
    <input type="text" name="username" required autofocus autocomplete="username">
    <label class="field-label">Password</label>
    <div class="pwd-field">
      <input type="password" name="password" required autocomplete="current-password">
      <button type="button" class="js-pwd-toggle" aria-label="Mostra password">👁️</button>
    </div>
    <button class="btn-primary" type="submit">Accedi</button>
  </form>
  <p class="muted">Non hai un account? <a href="/register">Registrati</a></p>
</div>
{% endblock %}
