services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Volume dedicato: i dati del DB sopravvivono ai riavvii del container
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-15}
    ports:
      # Raggiungibile da tutta la LAN: http://IP_MACCHINA:APP_PORT
      - "${APP_PORT:-8000}:8000"
    volumes:
      # Volume dedicato: i media caricati sopravvivono ai riavvii del container
      - media_data:/app/media

volumes:
  db_data:
  media_data:
